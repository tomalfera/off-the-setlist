<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Off the Setlist — Request a Song</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0d0d0d;
  color: #e0e0e0;
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}

/* ── Header ─────────────────────── */
header {
  background: #1a1a1a;
  padding: 12px 16px;
  border-bottom: 1px solid #333;
  flex-shrink: 0;
}
header h1 {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 20px;
  font-weight: normal;
  color: #fff;
  text-align: center;
  margin-bottom: 10px;
}
header h1 span { color: #e74c3c; }
#search {
  width: 100%;
  padding: 10px 14px;
  font-size: 16px;
  background: #222;
  border: 1px solid #444;
  border-radius: 8px;
  color: #fff;
  outline: none;
}
#search::placeholder { color: #666; }
#search:focus { border-color: #e74c3c; }

/* ── Song List ───────────────────── */
#song-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  -webkit-overflow-scrolling: touch;
}
.song-btn {
  display: block;
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 6px;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  color: #e0e0e0;
  font-size: 16px;
  text-align: left;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}
.song-btn:active {
  background: #2a2a2a;
  border-color: #e74c3c;
  transform: scale(0.985);
}
.song-btn.requested {
  background: #1a2a1a;
  border-color: #27ae60;
}
.song-btn.hidden { display: none; }
.song-num {
  display: inline-block;
  width: 28px;
  color: #666;
  font-size: 13px;
}

/* ── Toast ──────────────────── */
#toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: #27ae60;
  color: #fff;
  padding: 12px 24px;
  border-radius: 24px;
  font-size: 15px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  z-index: 100;
}
#toast.show { opacity: 1; }

/* ── Footer ─────────────── */
footer {
  flex-shrink: 0;
  padding: 10px 16px;
  background: #1a1a1a;
  border-top: 1px solid #333;
  text-align: center;
}
footer p {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 12px;
  color: #888;
  margin-bottom: 6px;
}
#counter {
  font-size: 11px;
  color: #555;
}

/* ── Requested Pulse Animation ────── */
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
  70% { box-shadow: 0 0 0 10px rgba(231, 76, 60, 0); }
  100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
}
.song-btn.just-requested {
  animation: pulse 0.6s ease-out;
  border-color: #e74c3c;
}
</style>
</head>
<body>

<header>
  <h1>Off the <span>Setlist</span> <small style="font-size:10px;color:#555;">v2</small></h1>
  <input type="text" id="search" placeholder="🔍  Search 110+ songs…" autocomplete="off">
</header>

<div id="song-list"></div>

<div id="toast"></div>

<footer>
  <p>Requests &amp; Tips Graciously Accepted</p>
  <div id="counter"></div>
</footer>

<script>
// ── Song Data ──────────────────────────────────────
const SONGS = [
  "Against the Wind","Ain't Even Done with the Night","And It Stoned Me",
  "Angel from Montgomery","Baba O'Reilly","Biloxi",
  "Blue Eyes Crying in the Rain","Brain Damage/Wish You Were Here",
  "California Hymn","The Cape","Carefree Highway",
  "Check It Out","City of New Orleans","Codeine",
  "Country Comfort","Crazy Train","Dancing in the Dark",
  "Danny's Song","Diamonds and Gasoline","Down the Road",
  "Drift Away","Drunkard's Prayer",
  "Easy (Like Sunday Morning)","Even the Losers","Fire Lake",
  "Fool for Love","Ghost","Gold","Hallelujah","Handle Me with Care",
  "Heart of Gold","Hello in There",
  "Hey Hey What Can I Do","I Can Help",
  "I Won't Back Down","I'm Tired Joey Boy",
  "If Today Doesn't Do Me in","Into the Mystic",
  "It's the End of the World Again","Just Got Paid",
  "Keep the Wolves Away","Kern River","Knockin' on Heaven's Door",
  "Learning to Fly","Letter to Madeline",
  "Listen to Her Heart","Listen to the Music","Live Forever",
  "Moonshiner","The Muse","My Hometown","No Regrets",
  "Norwegian Wood","One Horse Town","Operator","Orange Blossoms",
  "Out on the Weekend","Overkill","The Painter",
  "Panheads Forever","Paradise","Refugee",
  "Ripple","Rocky Mountain High",
  "Roll with the Changes","Roller Derby Queen","Romeo's Tune",
  "Running on Empty","Seminole Wind",
  "Slip Sliding Away","Small Town","So Good to Feel Good Again",
  "Souvenirs","Storm Windows","Summer of '69",
  "Sweet Melissa","Swingin'","Take Me Home, Country Roads",
  "Tequila Sunrise","Turn on Your Love Light","Wagon Wheel",
  "Walk on, Boy","The Way It Is","The Weight","What Light",
  "When the Stars Come Out","Where Rainbows Never Die",
  "Wildflowers","Willin'","Wish You Were Here",
  "You Got Lucky"
];

// ── State ──────────────────────────────────────────
const requestedSongs = new Set();

// ── Render ─────────────────────────────────────────
const list = document.getElementById('song-list');
const counter = document.getElementById('counter');
const search = document.getElementById('search');
const toast = document.getElementById('toast');

function renderAll() {
  list.innerHTML = '';
  let num = 1;
  SONGS.forEach(song => {
    const btn = document.createElement('button');
    btn.className = 'song-btn';
    if (requestedSongs.has(song)) btn.classList.add('requested');
    btn.innerHTML = '<span class="song-num">' + (num++) + '.</span>' + song;
    btn.addEventListener('click', () => requestSong(song, btn));
    list.appendChild(btn);
  });
  updateCounter();
}

function updateCounter() {
  counter.textContent = requestedSongs.size + ' song' + (requestedSongs.size !== 1 ? 's' : '') + ' requested this session';
}

// ── Search ─────────────────────────────────────────
search.addEventListener('input', () => {
  const q = search.value.toLowerCase().trim();
  const btns = list.querySelectorAll('.song-btn');
  btns.forEach(btn => {
    const text = btn.textContent.toLowerCase();
    btn.classList.toggle('hidden', q && !text.includes(q));
  });
});

// ── Request ────────────────────────────────────────
function requestSong(song, btn) {
  if (requestedSongs.has(song)) return;

  requestedSongs.add(song);
  btn.classList.add('requested', 'just-requested');
  setTimeout(() => btn.classList.remove('just-requested'), 600);
  updateCounter();

  // Send to ntfy.sh — no auth, instant push notification
  fetch('https://ntfy.sh/tomalfera-setlist-502177', {
    method: 'POST',
    body: '\uD83C\uDFB5 ' + song,
    headers: { 'Title': 'Song Request' }
  }).then(() => {
    toast.textContent = '\u2714 ' + song + ' — Requested!';
  }).catch(() => {
    toast.textContent = '\u26A0 Signal issue — tap again';
  });

  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), 2500);
}

// ── Init ───────────────────────────────────────────
renderAll();
</script>
</body>
</html>
